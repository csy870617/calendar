name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      # 임시: 검토 브랜치 배포용 (main 병합 후 제거 가능)
      - claude/affectionate-hawking-8be6b6
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 동시에 여러 배포가 겹치지 않도록 직렬화
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
